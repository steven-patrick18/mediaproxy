upstream baseapp {
    server 127.0.0.1:8080;
    keepalive 128;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

server {
    listen 80;
    listen [::]:80;
    server_name mediaproxy.voipzap.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mediaproxy.voipzap.com;

    ssl_certificate     /etc/letsencrypt/live/mediaproxy.voipzap.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mediaproxy.voipzap.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    client_max_body_size 32m;
    root /opt/mediaproxy/web/dist;
    index index.html;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;

    # Hashed bundle files — cache forever
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # HOMER 7 backend uses /api/v3/. Mediaproxy panel uses /api/v1/ so
    # these are disjoint; route v3 to homer-app before the catch-all.
    location /api/v3/ {
        proxy_pass http://127.0.0.1:9080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/           { proxy_pass http://baseapp; }
    location = /healthz      { proxy_pass http://baseapp; }
    location = /readyz       { proxy_pass http://baseapp; }
    location = /agent-binary { proxy_pass http://baseapp; }

    # HOMER 7 SIP-ladder viewer (Phase 4 of Route Quality).
    # Backed by docker-compose at /opt/homer/. Proxy strips the /homer/
    # prefix on the way to homer-app:9080 (trailing-slash trick). The
    # sub_filter rewrites HOMER s base href so its SPA assets resolve
    # correctly under the subpath. WebSocket Upgrade is forwarded for
    # HOMER s live features.
    location = /homer { return 301 https://$host/homer/; }
    location /homer/ {
        proxy_pass http://127.0.0.1:9080/;
        proxy_http_version 1.1;
    proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        sub_filter "<base href=\"/\"" "<base href=\"/homer/\"";
        sub_filter_once on;
        # HOMER UI legitimately frames itself; relax parent DENY here.
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # index.html must never be cached — it references the hashed bundle
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }
}
