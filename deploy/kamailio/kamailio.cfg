####### mediaproxy SIP proxy — Kamailio config (per implementation spec) #######
# Resolves the per-client signaling IP from Redis (sig:<dialer_ip>) and forces
# the outbound INVITE to be sent FROM that signaling IP.
#
# The agent regenerates /etc/kamailio/listen.cfg with one listen= per managed
# signaling IP. Kamailio cannot hot-add sockets — reload during maintenance
# windows or pre-list all planned IPs on first boot.

#!define DBURL_REDIS "name=cp;addr=127.0.0.1;port=6379;db=0"

# Loaded by the agent:
include_file "/etc/kamailio/listen.cfg"   # listen=udp:IP:5060 lines

####### Global params #######
debug=2
log_stderror=no
log_facility=LOG_LOCAL0
fork=yes
children=4

####### Modules #######
loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"

loadmodule "ndb_redis.so"
modparam("ndb_redis", "server", DBURL_REDIS)

loadmodule "jansson.so"

loadmodule "rtpengine.so"
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")

####### Request route #######
request_route {

    # 1) Drop anything non-SIP / malformed early.
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }
    if (!sanity_check()) { exit; }

    if (!is_method("INVITE|ACK|BYE|CANCEL|OPTIONS")) {
        sl_send_reply("405","Method Not Allowed");
        exit;
    }

    # 2) Resolve client + signaling IP by dialer source IP.
    redis_cmd("cp", "GET sig:$si", "r");
    if ($redis(r=>type) == -1 || $redis(r=>value) == $null) {
        xlog("L_NOTICE", "denying call: dialer $si not whitelisted\n");
        sl_send_reply("403","Forbidden");
        exit;
    }
    jansson_get("signaling_ip", $redis(r=>value), "$var(sig_ip)");
    jansson_get("client_id",    $redis(r=>value), "$var(client_id)");
    if ($var(sig_ip) == $null) {
        xlog("L_ERR", "client $var(client_id) has no signaling_ip\n");
        sl_send_reply("500","No signaling IP");
        exit;
    }

    # 3) Force outbound to leave FROM the client's signaling IP.
    #    $fs MUST match a listen= line in listen.cfg or the message is dropped.
    $fs = "udp:" + $var(sig_ip) + ":5060";

    # 4) Media handling (control plane resolves media_ip and per-call rotation
    #    elsewhere; this stub keeps a working pipeline today).
    if (is_method("INVITE|ACK")) {
        rtpengine_manage();
    }

    # 5) Loose routing for in-dialog requests.
    if (loose_route()) {
        t_relay();
        exit;
    }

    # 6) Forward. Carrier routing decision is out of scope for this feature;
    #    plug your routing module in here. For now, require $du to be set
    #    upstream by the routing logic.
    if ($du == "") {
        sl_send_reply("404","No Route");
        exit;
    }
    t_relay();
}

onreply_route {
    if (status =~ "(180|183|200)") {
        rtpengine_manage();
    }
}
